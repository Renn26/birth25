<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:white;
}

.container{
  padding:40px 20px;
}

h1{
  font-size:2.5em;
}

img{
  width:200px;
  border-radius:20px;
  margin:20px 0;
}

.message{
  font-size:1.2em;
  max-width:400px;
  margin:auto;
}

button{
  margin-top:20px;
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:white;
  color:#ff5c8a;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎉 Happy Birthday Alex! 🎂</h1>

  <img src="friend.jpg" alt="Birthday person">

  <p class="message">
  Wishing you an amazing birthday filled with happiness,
  laughter, and cake. Thanks for being an awesome friend!
  </p>

  <button onclick="showSurprise()">Tap for Surprise 🎁</button>
</div>

<script>
function showSurprise(){
  alert("🎉 Surprise! Hope your day is amazing!");
}
</script>

</body>
</html>
